name: Verif Quotidienne Abonnements
on:
  schedule:
    - cron: '0 8 * * *' # S'exécute tous les jours à 8h00
  workflow_dispatch: # Permet de le lancer manuellement pour tester

jobs:
  check-users:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Installer Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Executer le script
        run: python notifier.py
